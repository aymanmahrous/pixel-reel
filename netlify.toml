# Netlify/Render configuration for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache configuration
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
